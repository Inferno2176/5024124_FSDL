<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>CAROUSEL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="demo" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="paris.png" alt="Rome" class="d-block w-100">
                <div class="carousel-caption">
                    <h3><b>PARIS</b></h3>
                </div>
            </div>
            <div class="carousel-item">
                <img src="sydney.png" alt="Sydney" class="d-block w-100">
                <div class="carousel-caption">
                    <h3><b>SYDNEY</b></h3>
                </div>
            </div>
            <div class="carousel-item">
                <img src="newyork.png" alt="New York" class="d-block w-100">
                <div class="carousel-caption">
                    <h3><b>NEW YORK</b></h3>
                </div>
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
    <div class="nav">
        <div class="nav-brand">TOURISM </div>
        <div class="nav-links">
            <a href="#">HOME</a>
            <a href="#">CATALOGUE</a>
            <a href="#">RIDES</a>
            <a href="#">SCHEDULE</a>
            <a href="#">CONTACT</a>
        </div>
        <div class="nav-actions">
            <input type="search" class="searchbar" placeholder="Search...">
        </div>
    </div>
    <div class="container">
        <div class="cards-grid" id="cards">
            <div class="card">
                <div class="card-visual visual-1"></div>
                <div class="card-content">
                    <h3><b>Summer Vacation</b></h3>
                    <a href="#" class="btn-card">Check Schedules</a>
                </div>
            </div>
            <div class="card">
                <div class="card-visual visual-2"></div>
                <div class="card-content">
                    <h3><b>Winter Vacation</b></h3>
                    <a href="#" class="btn-card">Check Schedules</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Fitify</title>
    <link rel="stylesheet" href="ReactPractice/src/Calendar.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body.desktop-body {
            overflow: hidden;
            height: 100vh;
        }

        .calendar-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            height: calc(100vh - 180px);
            /* Fill remaining height */
        }

        .big-calendar-card {
            background: #f8fbf9;
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            border: 1px solid #e1f5e9;
            height: 100%;
        }

        .details-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #eee;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Updated Calendar Styles */
        .calendar-grid-full {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: auto repeat(6, 1fr);
            /* Ensure 6 rows fill height */
            gap: 8px;
            flex: 1;
            /* Grow to fill container */
            height: 100%;
            /* Explicit height */
        }

        .cal-day-box {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 8px;
            font-size: 0.95rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-height: 0;
            /* Allow shrinking in flex/grid */
        }

        .cal-day-box:hover {
            border-color: var(--primary-blue);
        }

        .cal-day-box.selected {
            border: 2px solid var(--primary-blue);
            background: #f0fdf4;
        }

        .cal-day-box.today {
            background: #e6fffa;
            font-weight: bold;
        }

        .cal-day-box.other-month {
            background: #fdfdfd;
            color: #ccc;
            opacity: 0.6;
        }

        .cal-day-box.other-month:hover {
            border-color: #eee;
            transform: none;
            cursor: default;
        }

        .mini-event-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-orange);
            border-radius: 50%;
            margin-top: auto;
            align-self: flex-end;
            /* Move to corner */
            margin-right: 4px;
            margin-bottom: 4px;
        }

        /* Details Panel Styles */
        .details-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .event-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .note-area {
            flex: 1;
            width: 100%;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 1rem;
            resize: none;
            font-family: inherit;
            margin-top: 1rem;
            outline: none;
        }

        .note-area:focus {
            border-color: var(--primary-blue);
        }

        /* Responsive Calendar */
        @media (max-width: 900px) {
            body.desktop-body {
                overflow: auto !important;
                /* Allow scroll on mobile */
                height: auto !important;
            }

            .main-content,
            .dashboard-container {
                height: auto !important;
                margin-top: 1.5rem !important;
                margin-bottom: 2rem;
            }

            .calendar-wrapper {
                grid-template-columns: 1fr;
                /* Stack vertically */
                height: auto;
                gap: 2rem;
            }

            .big-calendar-card {
                height: 500px;
                /* Fixed height for calendar on mobile */
            }

            .details-card {
                height: auto;
                min-height: 400px;
            }
        }
    </style>
</head>

<body class="desktop-body" style="overflow: hidden;">
    <main class="dashboard-container" style="max-width: 1400px; margin-top: 0.5rem; height: calc(100vh - 110px);">
        <div class="calendar-wrapper">
            <div class="big-calendar-card">
                <div class="calendar-header" style="margin-bottom: 1rem; padding: 0 0.5rem;">
                    <div class="calendar-controls"><button onclick="changeMonth(-1)">❮</button></div>
                    <h2 id="monthDisplay" style="margin: 0; color: var(--primary-dark); font-size: 1.5rem;"></h2>
                    <div class="calendar-controls"><button onclick="changeMonth(1)">❯</button></div>
                </div>
                <div class="calendar-grid-full" id="calendarGrid">
                    <div class="day-name">Sun</div>
                    <div class="day-name">Mon</div>
                    <div class="day-name">Tue</div>
                    <div class="day-name">Wed</div>
                    <div class="day-name">Thu</div>
                    <div class="day-name">Fri</div>
                    <div class="day-name">Sat</div>
                </div>
            </div>
            <div class="details-card">
                <div class="details-header"
                    style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <h2 id="selectedDateDisplay" style="margin:0; font-size: 1.5rem;">Select a
                            Date</h2>
                        <p style="color: #888; margin: 0.5rem 0 0 0; font-size: 0.9rem;">Manage your
                            schedule</p>
                    </div><button id="resetDateBtn" onclick="resetToToday()" class="streak-badge"
                        style="border:none; cursor:pointer; font-size:0.8rem; display:none; flex-shrink: 0;">Today
                    </button>
                </div>
                <div style="margin-bottom: 1.5rem; flex: 1; overflow-y: auto;">
                    <h4 style="margin-bottom: 0.8rem;">Events</h4>
                    <div id="eventsList">
                        <p style="color:#aaa; font-size:0.9rem;">No events set.</p>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 1rem;"><input type="text" id="newEventInput"
                            class="form-input" placeholder="Add new event..." style="padding: 0.5rem;"><button
                            class="action-btn" onclick="addCurrentEvent()" style="padding: 0.5rem 1rem;">+</button>
                    </div>
                </div>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <h4 style="margin-bottom: 0.5rem;">Daily Notes</h4><textarea id="dailyNotes" class="note-area"
                        placeholder="Write your thoughts, workout notes, or meal reflections here..."></textarea>
                    <div style="text-align: right; margin-top: 0.5rem;"><button class="action-btn" onclick="saveNotes()"
                            style="font-size: 0.8rem;">Save Notes</button></div>
                </div>
            </div>
        </div>
    </main>
    <script src="assets/js/dashboard.js"></script>
    <script>let viewDate = new Date();
        let selectedDate = new Date(); // Defaults to today

        // Data Store: { "YYYY-MM-DD": { events: [], notes: "" } }
        let calendarData = JSON.parse(localStorage.getItem('fitifyCalendar')) || {}

            ;

        document.addEventListener('DOMContentLoaded', () => {
            loadProfileName();
            renderCalendar();
            selectDate(new Date()); // Auto-select today
        });

        async function loadProfileName() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');

            if (token) {
                try {
                    const res = await fetch('http://localhost:5000/api/user/profile', {
                        headers: {
                            'x-auth-token': token
                        }
                    });

                    if (res.ok) {
                        const user = await res.json();
                        document.getElementById('userName').textContent = user.name || 'User';
                        window.userData = user;

                        // Update Streak
                        if (typeof calculateStreak === 'function') {
                            const streak = calculateStreak(user);
                            const streakBadge = document.querySelector('.mfp-header .streak-badge');

                            if (streakBadge) streakBadge.textContent = `$ {
                            streak
                        }

                        DAY STREAK`;
                        }
                    }

                    else {
                        showToast('Failed to load profile', 'error');
                    }
                }

                catch (err) {
                    console.error(err);
                    showToast('Network error loading profile', 'error');
                }
            }
        }

        function getKey(date) {
            return date.toISOString().split('T')[0];
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('monthDisplay');

            // Clear but keep first 7 (Headers)
            while (grid.children.length > 7) {
                grid.removeChild(grid.lastChild);
            }

            display.textContent = viewDate.toLocaleDateString('en-US', {
                month: 'long', year: 'numeric'
            });

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const prevMonthLastDate = new Date(year, month, 0).getDate();

            // 1. Previous Month Dates (Faded)
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                const dayNum = prevMonthLastDate - i;
                const div = document.createElement('div');
                div.className = 'cal-day-box other-month';

                div.innerHTML = `<span>${dayNum}</span>`;
                grid.appendChild(div);
            }

            // 2. Current Month Dates
            for (let i = 1; i <= lastDate; i++) {
                const date = new Date(year, month, i);
                const dateKey = getKey(date);
                const div = document.createElement('div');
                div.className = 'cal-day-box';

                div.innerHTML = `<span>${i}</span>`;

                if (date.toDateString() === new Date().toDateString()) div.classList.add('today');
                if (date.toDateString() === selectedDate.toDateString()) div.classList.add('selected');

                if (calendarData[dateKey] && (calendarData[dateKey].events?.length > 0 || calendarData[dateKey].notes)) {
                    div.innerHTML += `<div class="mini-event-dot"></div>`;
                }

                div.onclick = () => selectDate(date);
                grid.appendChild(div);
            }

            // 3. Next Month Dates (Faded) to fill 6 rows (42 cells total)
            const totalCells = firstDayIndex + lastDate;
            const remaining = 42 - totalCells; // Force 6 rows for consistent height

            for (let i = 1; i <= remaining; i++) {
                const div = document.createElement('div');
                div.className = 'cal-day-box other-month';

                div.innerHTML = `<span>${i}</span>`;
                grid.appendChild(div);
            }

            // Also update the Today button visibility in the side panel
            if (typeof updateDetailsPanel === 'function') {
                updateDetailsPanel();
            }
        }

        function changeMonth(delta) {
            viewDate.setMonth(viewDate.getMonth() + delta);
            renderCalendar();
        }

        function resetToToday() {
            viewDate = new Date();
            renderCalendar();
            selectDate(new Date()); // Optional: also select today
        }

        function selectDate(date) {
            selectedDate = date;

            // Update UI Selection visually without full re-render
            document.querySelectorAll('.cal-day-box').forEach(el => el.classList.remove('selected'));
            // Re-render is safer to ensure correct month view matches selection if jumping
            // But simple:
            renderCalendar();

            updateDetailsPanel();
        }

        function updateDetailsPanel() {
            const key = getKey(selectedDate);

            const data = calendarData[key] || {
                events: [], notes: ""
            }

                ;

            // Header
            const options = {
                weekday: 'long', month: 'long', day: 'numeric'
            }

                ;
            document.getElementById('selectedDateDisplay').textContent = selectedDate.toLocaleDateString('en-US', options);

            // Toggle Details "Today" Button
            const now = new Date();
            const dateBtn = document.getElementById('resetDateBtn');
            const isTodaySelected = selectedDate.toDateString() === now.toDateString();
            const isCurrentMonthView = viewDate.getMonth() === now.getMonth() && viewDate.getFullYear() === now.getFullYear();

            if (isTodaySelected && isCurrentMonthView) {
                dateBtn.style.display = 'none';
            }

            else {
                dateBtn.style.display = 'inline-block';
            }

            // Events
            const list = document.getElementById('eventsList');
            list.innerHTML = '';

            if (data.events && data.events.length > 0) {
                data.events.forEach((evt, idx) => {
                    const row = document.createElement('div');
                    row.className = 'event-list-item';

                    row.innerHTML = ` <span>$ {
                            evt
                        }

                        </span> <button onclick="removeEvent(${idx})" style="border:none; background:none; color:red; cursor:pointer;" >&times; </button> `;
                    list.appendChild(row);
                });
            }

            else {
                list.innerHTML = '<p style="color:#aaa; font-size:0.9rem;">No events set.</p>';
            }

            // Notes
            document.getElementById('dailyNotes').value = data.notes || '';
        }

        function addCurrentEvent() {
            const input = document.getElementById('newEventInput');
            const val = input.value.trim();
            if (!val) return showToast('Please enter an event title', 'error');
            const key = getKey(selectedDate);

            if (!calendarData[key]) calendarData[key] = {
                events: [], notes: ""
            }

                ;
            if (!calendarData[key].events) calendarData[key].events = [];

            calendarData[key].events.push(val);
            saveData();
            input.value = '';
            updateDetailsPanel();
            renderCalendar(); // To show dot
        }

        function removeEvent(idx) {
            const key = getKey(selectedDate);

            if (calendarData[key] && calendarData[key].events) {
                calendarData[key].events.splice(idx, 1);
                saveData();
                updateDetailsPanel();
                renderCalendar();
            }
        }

        function saveNotes() {
            const val = document.getElementById('dailyNotes').value;
            const key = getKey(selectedDate);

            if (!calendarData[key]) calendarData[key] = {
                events: [], notes: ""
            }

                ;
            calendarData[key].notes = val;

            saveData();
            showToast('Notes saved!');
            renderCalendar(); // To update dot if it was empty
        }

        function saveData() {
            localStorage.setItem('fitifyCalendar', JSON.stringify(calendarData));
        }

    </script>
</body>

</html>
